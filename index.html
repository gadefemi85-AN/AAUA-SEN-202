<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Security Reporting System</title>
    <style>
        :root {
            --primary-color: #d32f2f; /* Security red */
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .form-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 5px;
            text-align: center;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            background-color: #fafafa;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #b71c1c;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Campus Security Portal</h1>
        <p class="subtitle">Report an Incident Safely and Quickly</p>
        
        <form id="reportingForm" onsubmit="event.preventDefault(); alert('Report Submitted Successfully!');">
            <div class="form-group">
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="matricNumber">Matric Number:</label>
                <input type="text" id="matricNumber" placeholder="Enter your matric number" required>
            </div>

            <div class="form-group">
                <label for="incidentType">Incident Type:</label>
                <select id="incidentType">
                    <option value="Theft">Theft</option>
                    <option value="Harassment">Harassment</option>
                    <option value="Medical Emergency">Medical Emergency</option>
                    <option value="Vandalism">Vandalism</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="location">Location:</label>
                <input type="text" id="location" placeholder="e.g., Hostel, Lecture Hall B" required>
            </div>

            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" placeholder="Provide details about the incident..." required></textarea>
            </div>

            <button type="submit">Submit Report</button>
        </form>
    </div>

</body>
</html>
